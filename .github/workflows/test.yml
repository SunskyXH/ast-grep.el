name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - "28.2"
          - "29.4"
          - "30.1"
        include:
          # consult requires Emacs 29.1+, so it is only installed for
          # the newer matrix entries. On 28.2 the consult-dependent
          # tests skip via `skip-unless` and the rest still run.
          - emacs-version: "29.4"
            install-consult: true
            extra-load-path: "-L /tmp/consult -L /tmp/compat"
          - emacs-version: "30.1"
            install-consult: true
            extra-load-path: "-L /tmp/consult -L /tmp/compat"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Install ast-grep
        run: |
          nix profile install nixpkgs#ast-grep
          ast-grep --version

      - name: Install compat and consult
        if: matrix.install-consult
        run: |
          git clone --depth=1 https://github.com/emacs-compat/compat.git /tmp/compat
          git clone --depth=1 https://github.com/minad/consult.git /tmp/consult

      - name: Byte-compile
        run: |
          emacs -batch -L . ${{ matrix.extra-load-path }} \
            --eval "(setq byte-compile-error-on-warn t)" \
            -f batch-byte-compile ast-grep.el

      - name: Run tests
        run: |
          emacs -batch -L . ${{ matrix.extra-load-path }} \
            -l ast-grep.el -l tests/ast-grep-test.el \
            -f ert-run-tests-batch-and-exit
