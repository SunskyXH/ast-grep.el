name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Emacs ${{ matrix.emacs-version }} / ${{ matrix.backend }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - emacs-version: "28.2"
            backend: sync
            eask-script: test:sync
          - emacs-version: "28.2"
            backend: ivy
            eask-script: test:ivy
          # Consult currently requires Emacs 29.1+, so consult/full jobs
          # intentionally start at 29.4.
          - emacs-version: "29.4"
            backend: sync
            eask-script: test:sync
          - emacs-version: "29.4"
            backend: consult
            eask-script: test:consult
          - emacs-version: "29.4"
            backend: ivy
            eask-script: test:ivy
          - emacs-version: "29.4"
            backend: full
            eask-script: test:full
          - emacs-version: "30.1"
            backend: sync
            eask-script: test:sync
          - emacs-version: "30.1"
            backend: consult
            eask-script: test:consult
          - emacs-version: "30.1"
            backend: ivy
            eask-script: test:ivy
          - emacs-version: "30.1"
            backend: full
            eask-script: test:full

    steps:
      - uses: actions/checkout@v4

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Set up Eask
        uses: emacs-eask/setup-eask@master
        with:
          version: "0.12.9"

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Install ast-grep
        run: |
          nix profile install nixpkgs#ast-grep
          ast-grep --version

      - name: Byte-compile
        run: eask run script compile

      - name: Run backend tests
        run: eask run script ${{ matrix.eask-script }}
