name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        emacs-version:
          - "28.2"
          - "29.4"
          - "30.1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Install ast-grep
        run: |
          nix profile install nixpkgs#ast-grep
          ast-grep --version

      - name: Run all tests
        run: ./run-tests.sh all

      - name: Test with Emacs daemon (simulates user interaction)
        run: |
          # Start Emacs daemon to simulate user-like environment
          emacs --daemon
          
          # Load package and test through emacsclient
          if emacsclient -e "(progn \
            (add-to-list 'load-path \"$(pwd)\") \
            (require 'ast-grep) \
            (message \"ast-grep loaded successfully in daemon mode\"))"; then
            echo "✓ Package loaded successfully in daemon mode"
          else
            echo "✗ Failed to load package in daemon mode"
            emacsclient -e "(kill-emacs)"
            exit 1
          fi
          
          # Test that the package feature is available
          if emacsclient -e "(featurep 'ast-grep)" | grep -q "t"; then
            echo "✓ Package feature available in daemon mode"
          else
            echo "✗ Package feature not available in daemon mode"
            emacsclient -e "(kill-emacs)"
            exit 1
          fi
          
          # Stop daemon
          emacsclient -e "(kill-emacs)"
